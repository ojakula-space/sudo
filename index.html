            display: grid;

            padding: 2px;

            border-radius: 5px;
            margin-bottom: 20px;

        .cell {
            aspect-ratio: 1;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .cell.fixed {
            color: #667eea;
            background: #f0f0f0;
        }

        .cell.editable {
            color: #333;
        }

        .cell.selected {
            background: #e3f2fd;
            box-shadow: inset 0 0 0 3px #2196f3;
        }

        .cell.highlighted {
            background: #fff3e0;
        }

        .cell.error {
            color: #f44336;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .cell:nth-child(3n) {
            border-right: 3px solid #333;
        }

            border-bottom: 3px solid #333;

    <script>
        // ===== Service Worker registreerimine =====
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Registreeri inline service worker
                const swCode = `
                    const CACHE_NAME = 'sudoku-ojakyla-v2';
                    const urlsToCache = [
                        '/sudo/',
                        '/sudo/index.html'
                    ];

                    self.addEventListener('install', event => {
                        event.waitUntil(
                            caches.open(CACHE_NAME)
                                .then(cache => cache.addAll(urlsToCache))
                                .then(() => self.skipWaiting())
                        );
                    });

                    self.addEventListener('activate', event => {
                        event.waitUntil(
                            caches.keys().then(cacheNames => {
                                return Promise.all(
                                    cacheNames.map(cacheName => {
                                        if (cacheName !== CACHE_NAME) {
                                            return caches.delete(cacheName);
                                        }
                                    })
                                );
                            }).then(() => self.clients.claim())
                        );
                    });

                    self.addEventListener('fetch', event => {
                        event.respondWith(
                            caches.match(event.request)
                                .then(response => response || fetch(event.request))
                        );
                    });

                    self.addEventListener('message', event => {
                        if (event.data === 'skipWaiting') {
                            self.skipWaiting();
                        }
                    });
                `;
                
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                
                navigator.serviceWorker.register(swUrl)

        // ===== Mängu loogika (SudokuGame klass) =====
        class SudokuGame {
            constructor() {
                this.loadSavedGame();
                this.setupEventListeners();
                
                if (!this.grid) {
                    this.grid = Array(9).fill(0).map(() => Array(9).fill(0));
                    this.initialGrid = Array(9).fill(0).map(() => Array(9).fill(0));
                    this.difficulty = 'medium';
                    this.moves = 0;
                    this.errors = 0;
                    this.timerSeconds = 0;
                    this.newGame();
                }
                
                this.timerInterval = null;
                this.gameActive = false;
                this.selectedCell = null;
                
                this.renderGrid();
                this.updateStats();
                this.startTimer();
                
                // Laadi keel
                const savedLang = localStorage.getItem('sudokuLanguage');
                if (savedLang && savedLang !== currentLang) {
                    currentLang = savedLang;
                }
            }
            
            loadSavedGame() {
                try {
                    const saved = localStorage.getItem('sudokuGameState');
                    if (saved) {
                        const state = JSON.parse(saved);
                        this.grid = state.grid;
                        this.initialGrid = state.initialGrid;
                        this.difficulty = state.difficulty;
                        this.moves = state.moves;
                        this.errors = state.errors;
                        this.timerSeconds = state.timerSeconds;
                        return true;
                    }
                } catch (e) {
                    console.log('Ei saanud salvestatud mängu laadida');
                }
                return false;
            }
            
            saveGame() {
                try {
                    const state = {
                        grid: this.grid,
                        initialGrid: this.initialGrid,
                        difficulty: this.difficulty,
                        moves: this.moves,
                        errors: this.errors,
                        timerSeconds: this.timerSeconds
                    };
                    localStorage.setItem('sudokuGameState', JSON.stringify(state));
                } catch (e) {
                    console.log('Ei saanud mängu salvestada');
                }
            }
            
            setupEventListeners() {
                document.addEventListener('keydown', (e) => {
                    if (e.key >= '1' && e.key <= '9') {
                        this.inputNumber(parseInt(e.key));
                    } else if (e.key === 'Delete' || e.key === 'Backspace') {
                        this.clearCell();
                    } else if (e.key.startsWith('Arrow')) {
                        this.handleArrowKeys(e.key);
                        e.preventDefault();
                    }
                });
            }
            
            handleArrowKeys(key) {
                if (!this.selectedCell) return;
                
                const [row, col] = this.selectedCell;
                let newRow = row, newCol = col;
                
                switch(key) {
                    case 'ArrowUp': newRow = Math.max(0, row - 1); break;
                    case 'ArrowDown': newRow = Math.min(8, row + 1); break;
                    case 'ArrowLeft': newCol = Math.max(0, col - 1); break;
                    case 'ArrowRight': newCol = Math.min(8, col + 1); break;
                }
                
                this.selectCell(newRow, newCol);
            }
            
            renderGrid() {
                const gridElement = document.getElementById('sudokuGrid');
                gridElement.innerHTML = '';
                
                for (let i = 0; i < 9; i++) {
                    for (let j = 0; j < 9; j++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        
                        if (this.initialGrid[i][j] !== 0) {
                            cell.classList.add('fixed');
                            cell.textContent = this.initialGrid[i][j];
                        } else if (this.grid[i][j] !== 0) {
                            cell.classList.add('editable');
                            cell.textContent = this.grid[i][j];
                        }
                        
                        cell.dataset.row = i;
                        cell.dataset.col = j;
                        
                        cell.addEventListener('click', () => this.selectCell(i, j));
                        
                        gridElement.appendChild(cell);
                    }
                }
                
                this.updateHighlights();
            }
            
            selectCell(row, col) {
                if (this.initialGrid[row][col] !== 0) return;
                
                this.selectedCell = [row, col];
                this.updateHighlights();
            }
            
            updateHighlights() {
                const cells = document.querySelectorAll('.cell');
                cells.forEach(cell => cell.classList.remove('selected', 'highlighted'));
                
                if (this.selectedCell) {
                    const [selectedRow, selectedCol] = this.selectedCell;
                    
                    cells.forEach(cell => {
                        const row = parseInt(cell.dataset.row);
                        const col = parseInt(cell.dataset.col);
                        
                        if (row === selectedRow && col === selectedCol) {
                            cell.classList.add('selected');
                        } else if (row === selectedRow || col === selectedCol || 
                                  (Math.floor(row/3) === Math.floor(selectedRow/3) && 
                                   Math.floor(col/3) === Math.floor(selectedCol/3))) {
                            cell.classList.add('highlighted');
                        }
                    });
                }
            }
            
            inputNumber(num) {
                if (!this.selectedCell) {
                    this.showMessage(translations[currentLang].selectCell, 'info');
                    return;
                }
                
                const [row, col] = this.selectedCell;
                
                if (this.initialGrid[row][col] !== 0) {
                    this.showMessage(translations[currentLang].cannotEdit, 'error');
                    return;
                }
                
                if (this.isValidMove(row, col, num)) {
                    this.grid[row][col] = num;
                    this.moves++;
                    this.updateStats();
                    this.saveGame();
                    this.renderGrid();
                    this.selectCell(row, col);
                    
                    if (this.isSolved()) {
                        this.stopTimer();
                        this.showMessage(translations[currentLang].congratulations, 'success');
                        localStorage.removeItem('sudokuGameState');
                    }
                } else {
                    this.errors++;
                    this.updateStats();
                    this.saveGame();
                    this.showError(row, col);
                    this.showMessage(translations[currentLang].invalidMove, 'error');
                }
            }
            
            clearCell() {
                if (!this.selectedCell) return;
                
                const [row, col] = this.selectedCell;
                
                if (this.initialGrid[row][col] !== 0) {
                    this.showMessage(translations[currentLang].cannotEdit, 'error');
                    return;
                }
                
                this.grid[row][col] = 0;
                this.saveGame();
                this.renderGrid();
                this.selectCell(row, col);
            }
            
            isValidMove(row, col, num) {
                for (let j = 0; j < 9; j++) {
                    if (j !== col && this.grid[row][j] === num) return false;
                }
                
                for (let i = 0; i < 9; i++) {
                    if (i !== row && this.grid[i][col] === num) return false;
                }
                
                const startRow = Math.floor(row / 3) * 3;
                const startCol = Math.floor(col / 3) * 3;
                
                for (let i = startRow; i < startRow + 3; i++) {
                    for (let j = startCol; j < startCol + 3; j++) {
                        if (i !== row && j !== col && this.grid[i][j] === num) return false;
                    }
                }
                
                return true;
            }
            
            showError(row, col) {
                const cells = document.querySelectorAll('.cell');
                cells.forEach(cell => {
                    if (parseInt(cell.dataset.row) === row && 
                        parseInt(cell.dataset.col) === col) {
                        cell.classList.add('error');
                        setTimeout(() => cell.classList.remove('error'), 300);
                    }
                });
            }
            
            isSolved() {
                for (let i = 0; i < 9; i++) {
                    for (let j = 0; j < 9; j++) {
                        if (this.grid[i][j] === 0) return false;
                    }
                }
                return this.checkSolution();
            }
            
            checkSolution() {
                for (let i = 0; i < 9; i++) {
                    const row = new Set();
                    for (let j = 0; j < 9; j++) {
                        if (this.grid[i][j] === 0) return false;
                        row.add(this.grid[i][j]);
                    }
                    if (row.size !== 9) return false;
                }
                
                for (let j = 0; j < 9; j++) {
                    const col = new Set();
                    for (let i = 0; i < 9; i++) {
                        col.add(this.grid[i][j]);
                    }
                    if (col.size !== 9) return false;
                }
                
                for (let block = 0; block < 9; block++) {
                    const blockSet = new Set();
                    const startRow = Math.floor(block / 3) * 3;
                    const startCol = (block % 3) * 3;
                    
                    for (let i = startRow; i < startRow + 3; i++) {
                        for (let j = startCol; j < startCol + 3; j++) {
                            blockSet.add(this.grid[i][j]);
                        }
                    }
                    if (blockSet.size !== 9) return false;
                }
                
                return true;
            }
            
            solvePuzzle() {
                if (!this.solve(this.grid)) {
                    this.showMessage(translations[currentLang].noSolution, 'error');
                } else {
                    this.renderGrid();
                    this.showMessage(translations[currentLang].solved, 'success');
                }
            }
            
            solve(board) {
                const empty = this.findEmpty(board);
                if (!empty) return true;
                
                const [row, col] = empty;
                
                for (let num = 1; num <= 9; num++) {
                    if (this.isValidInBoard(board, row, col, num)) {
                        board[row][col] = num;
                        
                        if (this.solve(board)) return true;
                        
                        board[row][col] = 0;
                    }
                }
                
                return false;
            }
            
            findEmpty(board) {
                for (let i = 0; i < 9; i++) {
                    for (let j = 0; j < 9; j++) {
                        if (board[i][j] === 0) return [i, j];
                    }
                }
                return null;
            }
            
            isValidInBoard(board, row, col, num) {
                for (let j = 0; j < 9; j++) {
                    if (board[row][j] === num) return false;
                }
                
                for (let i = 0; i < 9; i++) {
                    if (board[i][col] === num) return false;
                }
                
                const startRow = Math.floor(row / 3) * 3;
                const startCol = Math.floor(col / 3) * 3;
                
                for (let i = startRow; i < startRow + 3; i++) {
                    for (let j = startCol; j < startCol + 3; j++) {
                        if (board[i][j] === num) return false;
                    }
                }
                
                return true;
            }
            
            getHint() {
                const tempBoard = this.grid.map(row => [...row]);
                
                if (this.solve(tempBoard)) {
                    const empty = this.findEmpty(this.grid);
                    if (empty) {
                        const [row, col] = empty;
                        const hintValue = tempBoard[row][col];
                        const msg = translations[currentLang].hintText
                            .replace('{0}', row + 1)
                            .replace('{1}', col + 1)
                            .replace('{2}', hintValue);
                        this.showMessage(msg, 'info');
                        this.selectCell(row, col);
                    }
                }
            }
            
            generatePuzzle(difficulty) {
                const fullBoard = Array(9).fill(0).map(() => Array(9).fill(0));
                this.fillDiagonal(fullBoard);
                this.solve(fullBoard);
                
                const puzzle = fullBoard.map(row => [...row]);
                const cellsToRemove = {
                    'easy': 40,
                    'medium': 50,
                    'hard': 60,
                    'expert': 65
                }[difficulty] || 50;
                
                let removed = 0;
                while (removed < cellsToRemove) {
                    const row = Math.floor(Math.random() * 9);
                    const col = Math.floor(Math.random() * 9);
                    
                    if (puzzle[row][col] !== 0) {
                        puzzle[row][col] = 0;
                        removed++;
                    }
                }
                
                return puzzle;
            }
            
            fillDiagonal(board) {
                for (let block = 0; block < 9; block += 3) {
                    const nums = [1, 2, 3, 4, 5, 6, 7, 8, 9];
                    this.shuffle(nums);
                    
                    let index = 0;
                    for (let i = block; i < block + 3; i++) {
                        for (let j = block; j < block + 3; j++) {
                            board[i][j] = nums[index++];
                        }
                    }
                }
            }
            
            shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }
            
            newGame() {
                const puzzle = this.generatePuzzle(this.difficulty);
                this.grid = puzzle.map(row => [...row]);
                this.initialGrid = puzzle.map(row => [...row]);
                this.selectedCell = null;
                this.moves = 0;
                this.errors = 0;
                this.timerSeconds = 0;
                this.renderGrid();
                this.updateStats();
                this.startTimer();
                this.saveGame();
                
                const diffNames = {
                    'easy': translations[currentLang].easy.toLowerCase(),
                    'medium': translations[currentLang].medium.toLowerCase(),
                    'hard': translations[currentLang].hard.toLowerCase(),
                    'expert': translations[currentLang].expert.toLowerCase()
                };
                
                this.showMessage(
                    translations[currentLang].newGameStarted.replace('{0}', diffNames[this.difficulty]), 
                    'success'
                );
            }
            
            resetGame() {
                this.grid = this.initialGrid.map(row => [...row]);
                this.selectedCell = null;
                this.moves = 0;
                this.errors = 0;
                this.renderGrid();
                this.updateStats();
                this.saveGame();
                this.showMessage(translations[currentLang].gameReset, 'info');
            }
            
            importPuzzle() {
                const input = document.getElementById('puzzleInput').value;
                const cleaned = input.replace(/[.\s\n|]/g, '');
                
                if (cleaned.length !== 81) {
                    this.showMessage(translations[currentLang].invalidFormat, 'error');
                    return;
                }
                
                const newGrid = [];
                for (let i = 0; i < 9; i++) {
                    const row = [];
                    for (let j = 0; j < 9; j++) {
                        const char = cleaned[i * 9 + j];
                        row.push(char === '0' || char === '.' ? 0 : parseInt(char));
                    }
                    newGrid.push(row);
                }
                
                this.grid = newGrid.map(row => [...row]);
                this.initialGrid = newGrid.map(row => [...row]);
                this.selectedCell = null;
                this.moves = 0;
                this.errors = 0;
                this.timerSeconds = 0;
                this.renderGrid();
                this.updateStats();
                this.startTimer();
                this.saveGame();
                this.showMessage(translations[currentLang].imported, 'success');
            }
            
            setDifficulty(difficulty) {
                this.difficulty = difficulty;
                
                document.querySelectorAll('.difficulty-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
            }
            
            updateStats() {
                document.getElementById('movesCount').textContent = this.moves;
                document.getElementById('errorsCount').textContent = this.errors;
                
                const filled = this.grid.flat().filter(v => v !== 0).length;
                const total = 81;
                const percent = Math.round((filled / total) * 100);
                document.getElementById('progressPercent').textContent = `${percent}%`;
            }
            
            startTimer() {
                if (this.timerInterval) clearInterval(this.timerInterval);
                
                this.gameActive = true;
                
                this.timerInterval = setInterval(() => {
                    if (this.gameActive) {
                        this.timerSeconds++;
                        const minutes = Math.floor(this.timerSeconds / 60);
                        const seconds = this.timerSeconds % 60;
                        document.getElementById('timer').textContent = 
                            `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                        this.saveGame();
                    }
                }, 1000);
            }
            
            stopTimer() {
                this.gameActive = false;
            }
            
            showMessage(text, type) {
                const messageEl = document.getElementById('message');
                const statusEl = document.getElementById('status');
                
                messageEl.textContent = text;
                messageEl.className = `message ${type}`;
                messageEl.style.display = 'block';
                
                statusEl.textContent = text;
                
                setTimeout(() => {
                    messageEl.style.display = 'none';
                }, 3000);
            }
        }
        
        // Globaalsed funktsioonid
        let game;
        
        window.addEventListener('DOMContentLoaded', () => {
            game = new SudokuGame();
            document.getElementById('footerYear').textContent = new Date().getFullYear();
            
            // Kontrolli URL parameetreid
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('action') === 'new') {
                game.newGame();
            }
        });
        
        function inputNumber(num) { game.inputNumber(num); }
        function clearCell() { game.clearCell(); }
        function checkSolution() { 
            if (game.checkSolution()) {
                game.showMessage(translations[currentLang].correct, 'success');
            } else {
                game.showMessage(translations[currentLang].notCorrect, 'error');
            }
        }
        function solvePuzzle() { game.solvePuzzle(); }
        function getHint() { game.getHint(); }
        function newGame() { 
            if (confirm(translations[currentLang].newGameStarted.replace('{0}', ''))) {
                game.newGame();
            }
        }
        function resetGame() { game.resetGame(); }
        function setDifficulty(diff) { game.setDifficulty(diff); }
        function importPuzzle() { game.importPuzzle(); }
        
        function showFamilyInfo() {
            alert(translations[currentLang].familyInfo);
        }
        
        function showOfflineInfo() {
            alert(translations[currentLang].offlineInfo);
        }
        
        function showInstructions() {
            alert(translations[currentLang].instructions);
        }
        
        function shareGame() {
            const shareUrl = 'https://ojakula-space.github.io/sudo/';
            if (navigator.share) {
                navigator.share({
                    title: 'Sudoku Pro - Perekond Ojaküla',
                    text: translations[currentLang].shareText,
                    url: shareUrl,
                });
            } else {
                prompt('Kopeeri see link:', shareUrl);
            }
        }
        
        // Globaalne teavituste funktsioon
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
