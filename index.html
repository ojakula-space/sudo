    <script>
        // ===== KONFETTI SÜSTEEM =====
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let confettiParticles = [];
        let animationFrame = null;
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        function createConfetti() {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4caf50', '#ff6b6b', '#ffeb3b', '#2196f3'];
            for (let i = 0; i < 150; i++) {
                confettiParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 8 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speedX: Math.random() * 4 - 2,
                    speedY: Math.random() * 6 + 3,
                    rotation: Math.random() * 360,
                    rotationSpeed: Math.random() * 10 - 5
                });
            }
        }
        
        function animateConfetti() {
            if (confettiParticles.length === 0) {
                if (animationFrame) {
                    cancelAnimationFrame(animationFrame);
                    animationFrame = null;
                }
                return;
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            confettiParticles = confettiParticles.filter(p => {
                p.x += p.speedX;
                p.y += p.speedY;
                p.rotation += p.rotationSpeed;
                
                if (p.y > canvas.height + 50) return false;
                
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
                
                return true;
            });
            
            animationFrame = requestAnimationFrame(animateConfetti);
        }
        
        function startConfetti() {
            confettiParticles = [];
            createConfetti();
            if (!animationFrame) {
                animateConfetti();
            }
            setTimeout(() => {
                confettiParticles = [];
            }, 5000);
        }
        
        function showVictory() {
            startConfetti();
            document.getElementById('victoryOverlay').classList.add('show');
        }
        
        function closeVictoryModal() {
            document.getElementById('victoryOverlay').classList.remove('show');
            confettiParticles = [];
        }
        
        // ===== SERVICE WORKER =====
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    const CACHE_NAME = 'sudoku-offline-v2';
                    self.addEventListener('install', (event) => { self.skipWaiting(); });
                    self.addEventListener('activate', (event) => {
                        event.waitUntil(caches.keys().then((keys) => Promise.all(keys.map(k => k !== CACHE_NAME ? caches.delete(k) : null))).then(() => self.clients.claim()));
                    });
                    self.addEventListener('fetch', (event) => {
                        event.respondWith(
                            fetch(event.request).then((resp) => {
                                const respClone = resp.clone();
                                caches.open(CACHE_NAME).then((cache) => cache.put(event.request, respClone));
                                return resp;
                            }).catch(() => caches.match(event.request))
                        );
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob));
            });
        }
        
        // ===== OFFLINE TUVASTAMINE =====
        function updateOnlineStatus() {
            const indicator = document.getElementById('offlineIndicator');
            indicator.classList.toggle('show', !navigator.onLine);
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

                subtitle: 'Решай, играй, наслаждайся!',

                medium: 'Средний',

                expert: 'Эксперт',
                moves: 'Ходы',
                errors: 'Ошибки',

                importPlaceholder: 'Вставьте Судоку (81 символ)...',
                install: 'Установить',

                offlineLink: '📡 Офлайн игра',

                instructionsLink: '❓ Инструкция',
                selectCell: 'Сначала выберите ячейку!',
                cannotEdit: 'Эту ячейку нельзя изменить!',
                invalidMove: 'Неверный ход!',
                congratulations: '🎉 Поздравляем! Вы решили Судоку!',
                solved: 'Судоку решено!',
                noSolution: 'Решение не найдено!',
                correct: '✓ Правильно!',
                notCorrect: '✗ Пока неверно.',
                hintText: 'Подсказка: в ячейке ({0}, {1}) должно быть {2}',

                offlineInfo: '📡 Игра работает офлайн! Установите и играйте!',

            }
        };
        
        let currentLang = 'et';
        
        // ===== PARANDATUD KEELEVAHETUS =====
        function setLanguage(lang) {
            currentLang = lang;
            
            // Uuenda aktiivne nupp
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`lang${lang.charAt(0).toUpperCase() + lang.slice(1)}`).classList.add('active');
            
            // Uuenda kõik tekstid
            const t = translations[lang];
            document.getElementById('gameTitle').textContent = t.title;
            document.getElementById('gameSubtitle').textContent = t.subtitle;
            document.getElementById('checkBtn').innerHTML = t.check;
            document.getElementById('solveBtn').innerHTML = t.solve;
            document.getElementById('hintBtn').innerHTML = t.hint;
            document.getElementById('newGameBtn').innerHTML = t.newGame;
            document.getElementById('resetBtn').innerHTML = t.reset;
            document.getElementById('clearBtn').innerHTML = t.clear;
            document.getElementById('diffEasy').textContent = t.easy;
            document.getElementById('diffMedium').textContent = t.medium;
            document.getElementById('diffHard').textContent = t.hard;
            document.getElementById('diffExpert').textContent = t.expert;
            document.getElementById('movesLabel').textContent = t.moves;
            document.getElementById('errorsLabel').textContent = t.errors;
            document.getElementById('progressLabel').textContent = t.progress;
            document.getElementById('importBtn').innerHTML = t.import;
            document.getElementById('puzzleInput').placeholder = t.importPlaceholder;
            document.getElementById('installText').textContent = t.install;
            document.getElementById('footerText').textContent = t.footer;
            document.getElementById('offlineLink').innerHTML = t.offlineLink;
            document.getElementById('shareLink').innerHTML = t.shareLink;
            document.getElementById('instructionsLink').innerHTML = t.instructionsLink;
            document.getElementById('victoryTitle').textContent = t.victoryTitle;
            document.getElementById('victoryMessage').textContent = t.victoryMessage;
            
            document.documentElement.lang = lang;
            localStorage.setItem('sudokuLanguage', lang);
            
            if (game) {
                game.showMessage(t.subtitle, 'info');
            }
        }
        
        // ===== SUDOKU MÄNG =====
        class SudokuGame {
            constructor() {
                this.grid = Array(9).fill(0).map(() => Array(9).fill(0));
                this.initialGrid = Array(9).fill(0).map(() => Array(9).fill(0));
                this.selectedCell = null;
                this.difficulty = 'medium';
                this.moves = 0;
                this.errors = 0;
                this.timerSeconds = 0;
                this.timerInterval = null;
                this.gameActive = true;
                
                this.loadSavedGame();
                this.renderGrid();
                this.setupEventListeners();
                this.updateStats();
                this.startTimer();
                
                // Laadi salvestatud keel
                const savedLang = localStorage.getItem('sudokuLanguage');
                if (savedLang && savedLang !== currentLang) {
                    setLanguage(savedLang);
                }
            }
            
            loadSavedGame() {
                try {
                    const saved = localStorage.getItem('sudokuGameState');
                    if (saved) {
                        const state = JSON.parse(saved);
                        this.grid = state.grid;
                        this.initialGrid = state.initialGrid;
                        this.difficulty = state.difficulty;
                        this.moves = state.moves;
                        this.errors = state.errors;
                        this.timerSeconds = state.timerSeconds;
                        
                        // Aktiveeri õige raskusastme nupp
                        document.querySelectorAll('.difficulty-btn').forEach(btn => {
                            btn.classList.remove('active');
                        });
                        const diffMap = { easy: 'diffEasy', medium: 'diffMedium', hard: 'diffHard', expert: 'diffExpert' };
                        const activeBtn = document.getElementById(diffMap[this.difficulty]);
                        if (activeBtn) activeBtn.classList.add('active');
                    } else {
                        this.newGame();
                    }
                } catch(e) {
                    this.newGame();
                }
            }
            
            saveGame() {
                try {
                    localStorage.setItem('sudokuGameState', JSON.stringify({
                        grid: this.grid, initialGrid: this.initialGrid,
                        difficulty: this.difficulty, moves: this.moves,
                        errors: this.errors, timerSeconds: this.timerSeconds
                    }));
                } catch(e) {}
            }
            
            setupEventListeners() {
                document.addEventListener('keydown', (e) => {
                    if (e.key >= '1' && e.key <= '9') {
                        this.inputNumber(parseInt(e.key));
                    } else if (e.key === 'Delete' || e.key === 'Backspace') {
                        this.clearCell();
                        e.preventDefault();
                    } else if (e.key.startsWith('Arrow')) {
                        this.handleArrowKeys(e.key);
                        e.preventDefault();
                    }
                });
            }
            
            handleArrowKeys(key) {
                if (!this.selectedCell) return;
                const [row, col] = this.selectedCell;
                let newRow = row, newCol = col;
                if (key === 'ArrowUp') newRow = Math.max(0, row - 1);
                else if (key === 'ArrowDown') newRow = Math.min(8, row + 1);
                else if (key === 'ArrowLeft') newCol = Math.max(0, col - 1);
                else if (key === 'ArrowRight') newCol = Math.min(8, col + 1);
                this.selectCell(newRow, newCol);
            }
            
            renderGrid() {
                const gridElement = document.getElementById('sudokuGrid');
                gridElement.innerHTML = '';
                for (let i = 0; i < 9; i++) {
                    for (let j = 0; j < 9; j++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        if (this.initialGrid[i][j] !== 0) {
                            cell.classList.add('fixed');
                            cell.textContent = this.initialGrid[i][j];
                        } else if (this.grid[i][j] !== 0) {
                            cell.classList.add('editable');
                            cell.textContent = this.grid[i][j];
                        }
                        cell.dataset.row = i;
                        cell.dataset.col = j;
                        cell.addEventListener('click', () => this.selectCell(i, j));
                        gridElement.appendChild(cell);
                    }
                }
                this.updateHighlights();
            }
            
            selectCell(row, col) {
                if (this.initialGrid[row][col] !== 0) return;
                this.selectedCell = [row, col];
                this.updateHighlights();
            }
            
            updateHighlights() {
                const cells = document.querySelectorAll('.cell');
                cells.forEach(c => c.classList.remove('selected', 'highlighted'));
                if (this.selectedCell) {
                    const [sRow, sCol] = this.selectedCell;
                    cells.forEach(cell => {
                        const row = parseInt(cell.dataset.row);
                        const col = parseInt(cell.dataset.col);
                        if (row === sRow && col === sCol) cell.classList.add('selected');
                        else if (row === sRow || col === sCol || 
                                (Math.floor(row/3) === Math.floor(sRow/3) && Math.floor(col/3) === Math.floor(sCol/3))) {
                            cell.classList.add('highlighted');
                        }
                    });
                }
            }
            
            inputNumber(num) {
                if (!this.selectedCell) {
                    this.showMessage(translations[currentLang].selectCell, 'info');
                    return;
                }
                const [row, col] = this.selectedCell;
                if (this.initialGrid[row][col] !== 0) {
                    this.showMessage(translations[currentLang].cannotEdit, 'error');
                    return;
                }
                if (this.isValidMove(row, col, num)) {
                    this.grid[row][col] = num;
                    this.moves++;
                    this.updateStats();
                    this.saveGame();
                    this.renderGrid();
                    this.selectCell(row, col);
                    if (this.isSolved()) {
                        this.stopTimer();
                        this.showMessage(translations[currentLang].congratulations, 'success');
                        showVictory(); // NÄITA VÕIDU SALUUTI!
                        localStorage.removeItem('sudokuGameState');
                    }
                } else {
                    this.errors++;
                    this.updateStats();
                    this.saveGame();
                    this.showError(row, col);
                    this.showMessage(translations[currentLang].invalidMove, 'error');
                }
            }
            
            clearCell() {
                if (!this.selectedCell) return;
                const [row, col] = this.selectedCell;
                if (this.initialGrid[row][col] !== 0) {
                    this.showMessage(translations[currentLang].cannotEdit, 'error');
                    return;
                }
                this.grid[row][col] = 0;
                this.saveGame();
                this.renderGrid();
                this.selectCell(row, col);
            }
            
            isValidMove(row, col, num) {
                for (let j = 0; j < 9; j++) if (j !== col && this.grid[row][j] === num) return false;
                for (let i = 0; i < 9; i++) if (i !== row && this.grid[i][col] === num) return false;
                const startRow = Math.floor(row/3)*3, startCol = Math.floor(col/3)*3;
                for (let i = startRow; i < startRow+3; i++) {
                    for (let j = startCol; j < startCol+3; j++) {
                        if (i !== row && j !== col && this.grid[i][j] === num) return false;
                    }
                }
                return true;
            }
            
            showError(row, col) {
                const cells = document.querySelectorAll('.cell');
                cells.forEach(cell => {
                    if (parseInt(cell.dataset.row) === row && parseInt(cell.dataset.col) === col) {
                        cell.classList.add('error');
                        setTimeout(() => cell.classList.remove('error'), 300);
                    }
                });
            }
            
            isSolved() {
                for (let i = 0; i < 9; i++) for (let j = 0; j < 9; j++) if (this.grid[i][j] === 0) return false;
                return this.checkSolution();
            }
            
            checkSolution() {
                for (let i = 0; i < 9; i++) {
                    const row = new Set(); for (let j = 0; j < 9; j++) row.add(this.grid[i][j]);
                    if (row.size !== 9) return false;
                }
                for (let j = 0; j < 9; j++) {
                    const col = new Set(); for (let i = 0; i < 9; i++) col.add(this.grid[i][j]);
                    if (col.size !== 9) return false;
                }
                for (let b = 0; b < 9; b++) {
                    const block = new Set();
                    const sr = Math.floor(b/3)*3, sc = (b%3)*3;
                    for (let i = sr; i < sr+3; i++) for (let j = sc; j < sc+3; j++) block.add(this.grid[i][j]);
                    if (block.size !== 9) return false;
                }
                return true;
            }
            
            solvePuzzle() {
                const solve = (board) => {
                    const empty = this.findEmpty(board);
                    if (!empty) return true;
                    const [row, col] = empty;
                    for (let num = 1; num <= 9; num++) {
                        if (this.isValidInBoard(board, row, col, num)) {
                            board[row][col] = num;
                            if (solve(board)) return true;
                            board[row][col] = 0;
                        }
                    }
                    return false;
                };
                if (!solve(this.grid)) this.showMessage(translations[currentLang].noSolution, 'error');
                else { this.renderGrid(); this.showMessage(translations[currentLang].solved, 'success'); }
            }
            
            findEmpty(board) {
                for (let i = 0; i < 9; i++) for (let j = 0; j < 9; j++) if (board[i][j] === 0) return [i, j];
                return null;
            }
            
            isValidInBoard(board, row, col, num) {
                for (let j = 0; j < 9; j++) if (board[row][j] === num) return false;
                for (let i = 0; i < 9; i++) if (board[i][col] === num) return false;
                const sr = Math.floor(row/3)*3, sc = Math.floor(col/3)*3;
                for (let i = sr; i < sr+3; i++) for (let j = sc; j < sc+3; j++) if (board[i][j] === num) return false;
                return true;
            }
            
            getHint() {
                const temp = this.grid.map(r => [...r]);
                const solve = (b) => { const e = this.findEmpty(b); if (!e) return true; const [r,c] = e; for (let n=1;n<=9;n++) { if (this.isValidInBoard(b,r,c,n)) { b[r][c]=n; if (solve(b)) return true; b[r][c]=0; } } return false; };
                solve(temp);
                const empty = this.findEmpty(this.grid);
                if (empty) {
                    const [r,c] = empty;
                    this.showMessage(translations[currentLang].hintText.replace('{0}',r+1).replace('{1}',c+1).replace('{2}',temp[r][c]), 'info');
                    this.selectCell(r, c);
                }
            }
            
            newGame() {
                const full = Array(9).fill(0).map(() => Array(9).fill(0));
                for (let b=0; b<9; b+=3) {
                    const nums = [1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5);
                    let idx=0;
                    for (let i=b;i<b+3;i++) for (let j=b;j<b+3;j++) full[i][j] = nums[idx++];
                }
                const solve = (b) => { const e=this.findEmpty(b); if (!e) return true; const [r,c]=e; for (let n=1;n<=9;n++) { if (this.isValidInBoard(b,r,c,n)) { b[r][c]=n; if (solve(b)) return true; b[r][c]=0; } } return false; };
                solve(full);
                
                const puzzle = full.map(r => [...r]);
                const toRemove = { easy:40, medium:50, hard:60, expert:65 }[this.difficulty]||50;
                let removed=0;
                while (removed < toRemove) {
                    const r=Math.floor(Math.random()*9), c=Math.floor(Math.random()*9);
                    if (puzzle[r][c] !== 0) { puzzle[r][c] = 0; removed++; }
                }
                
                this.grid = puzzle;
                this.initialGrid = puzzle.map(r => [...r]);
                this.selectedCell = null;
                this.moves = 0;
                this.errors = 0;
                this.timerSeconds = 0;
                this.renderGrid();
                this.updateStats();
                this.saveGame();
                this.showMessage(translations[currentLang].newGameStarted.replace('{0}', translations[currentLang][this.difficulty].toLowerCase()), 'success');
            }
            
            resetGame() {
                this.grid = this.initialGrid.map(r => [...r]);
                this.selectedCell = null;
                this.moves = 0;
                this.errors = 0;
                this.renderGrid();
                this.updateStats();
                this.saveGame();
                this.showMessage(translations[currentLang].gameReset, 'info');
            }
            
            importPuzzle() {
                const input = document.getElementById('puzzleInput').value.replace(/[.\s\n|]/g, '');
                if (input.length !== 81) { this.showMessage(translations[currentLang].invalidFormat, 'error'); return; }
                const ng = [];
                for (let i=0;i<9;i++) {
                    const row = [];
                    for (let j=0;j<9;j++) { const c = input[i*9+j]; row.push(c==='0'||c==='.'?0:parseInt(c)); }
                    ng.push(row);
                }
                this.grid = ng.map(r=>[...r]);
                this.initialGrid = ng.map(r=>[...r]);
                this.selectedCell = null;
                this.moves = 0;
                this.errors = 0;
                this.timerSeconds = 0;
                this.renderGrid();
                this.updateStats();
                this.saveGame();
                this.showMessage(translations[currentLang].imported, 'success');
            }
            
            setDifficulty(d) { 
                this.difficulty = d; 
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`diff${d.charAt(0).toUpperCase() + d.slice(1)}`).classList.add('active');
            }
            
            updateStats() {
                document.getElementById('movesCount').textContent = this.moves;
                document.getElementById('errorsCount').textContent = this.errors;
                const filled = this.grid.flat().filter(v=>v!==0).length;
                document.getElementById('progressPercent').textContent = `${Math.round(filled/81*100)}%`;
            }
            
            startTimer() {
                if (this.timerInterval) clearInterval(this.timerInterval);
                this.gameActive = true;
                this.timerInterval = setInterval(() => {
                    if (this.gameActive) {
                        this.timerSeconds++;
                        const m = Math.floor(this.timerSeconds/60), s = this.timerSeconds%60;
                        document.getElementById('timer').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                        this.saveGame();
                    }
                }, 1000);
            }
            
            stopTimer() { this.gameActive = false; }
            
            showMessage(text, type) {
                const msg = document.getElementById('message');
                msg.textContent = text;
                msg.className = `message ${type}`;
                msg.style.display = 'block';
                document.getElementById('status').textContent = text;
                setTimeout(() => msg.style.display = 'none', 3000);
            }
        }
        
        let game;
        window.addEventListener('DOMContentLoaded', () => { 
            game = new SudokuGame(); 
        });
        
        function inputNumber(n) { if (game) game.inputNumber(n); }
        function clearCell() { if (game) game.clearCell(); }
        function checkSolution() { 
            if (game) game.showMessage(game.checkSolution() ? translations[currentLang].correct : translations[currentLang].notCorrect, game.checkSolution() ? 'success' : 'error'); 
        }
        function solvePuzzle() { if (game) game.solvePuzzle(); }
        function getHint() { if (game) game.getHint(); }
        function newGame() { if (game && confirm(translations[currentLang].newGameStarted.replace('{0}', ''))) game.newGame(); }
        function resetGame() { if (game) game.resetGame(); }
        function setDifficulty(d) { if (game) game.setDifficulty(d); }
        function importPuzzle() { if (game) game.importPuzzle(); }
        
        function showFamilyInfo() { alert(translations[currentLang].familyInfo); }
        function showOfflineInfo() { alert(translations[currentLang].offlineInfo); }
        function showInstructions() { alert(translations[currentLang].instructions); }
        
        function shareGame() {
            const url = 'https://ojakula-space.github.io/sudo/';
            if (navigator.share) navigator.share({ title:'Sudoku Pro', text:translations[currentLang].shareText, url });
            else prompt('Kopeeri link:', url);
        }
